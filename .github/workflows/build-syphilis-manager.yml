name: Build Syphilis Manager

on:
  workflow_dispatch:
    inputs:
      sections_release_tag:
        description: 'Release tag for section files'
        required: true
        default: 'syphilis-sections-latest'
        type: string
      raw_data_release_tag:
        description: 'Release tag for raw data'
        required: true
        default: 'data-raw-v2026.03.09'
        type: string
      deps_release_tag:
        description: 'Release tag for manager dependencies'
        required: true
        default: 'data-managers-v2026.03.09'
        type: string
      jheem2_ref:
        description: 'jheem2 branch or tag to use'
        required: false
        default: 'dev'
        type: string
      update_spec:
        description: 'Regenerate the structural spec from this build (use when structure changes intentionally)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout jheem_analyses
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout jheem2
        uses: actions/checkout@v4
        with:
          repository: tfojo1/jheem2
          ref: ${{ inputs.jheem2_ref }}
          path: _jheem2

      - name: Symlink jheem2 as sibling directory
        run: ln -s "$GITHUB_WORKSPACE/_jheem2" "$GITHUB_WORKSPACE/../jheem2"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-packages-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: r-packages-

      - name: Install R dependencies
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("remotes", "jsonlite", "readxl", "dplyr", "stringr", "tidyr"))
          remotes::install_github("tfojo1/locations")
          remotes::install_local("_jheem2", upgrade = "never")
        shell: Rscript {0}

      - name: Download section files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _ci_inputs/sections
          gh release download "${{ inputs.sections_release_tag }}" \
            --dir _ci_inputs/sections \
            --pattern "syphilis.manager_section*.rdata"
          echo "Section files:"
          ls -lh _ci_inputs/sections/

      - name: Download raw data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _ci_inputs/raw
          gh release download "${{ inputs.raw_data_release_tag }}" \
            --dir _ci_inputs/raw
          tar -xzf _ci_inputs/raw/data-raw-*.tar.gz -C _ci_inputs/raw
          echo "Raw data extracted:"
          ls -lh _ci_inputs/raw/data_raw/

      - name: Download manager dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _ci_inputs/deps
          gh release download "${{ inputs.deps_release_tag }}" \
            --dir _ci_inputs/deps
          echo "Dependency files:"
          ls -lh _ci_inputs/deps/

      - name: Arrange CI inputs into Q_ROOT layout
        run: |
          mkdir -p _ci_root/data_managers/data.manager.merge
          cp _ci_inputs/sections/*.rdata _ci_root/data_managers/data.manager.merge/
          cp _ci_inputs/deps/*.rdata _ci_root/data_managers/
          if [ -d _ci_inputs/raw/data_raw ]; then
            ln -s "$(pwd)/_ci_inputs/raw/data_raw" _ci_root/data_raw
          fi
          echo "Q_ROOT layout:"
          find _ci_root -maxdepth 3 -type f | head -20

      - name: Run merge pipeline
        env:
          Q_ROOT: _ci_root
          OUTPUT_DIR: _ci_outputs
          ARCHIVE_DIR: _ci_outputs
          CACHED_DIR: _ci_outputs
        run: |
          mkdir -p _ci_outputs
          Rscript -e "
            library(jheem2)
            library(locations)
            library(dplyr)
            library(readxl)
            library(stringr)
            library(tidyr)
            source('data_processing/syphilis.manager/syphilis.processing.for.merging/syphilis.manager.merge.R')
          " 2>&1 | tee _ci_outputs/build_log.txt

      - name: Update spec from build
        if: inputs.update_spec
        run: |
          Rscript data_processing/syphilis.manager/validation/generate_spec.R \
            _ci_outputs/syphilis.manager.rdata

      - name: Run validation
        if: ${{ !inputs.update_spec }}
        run: |
          set -o pipefail
          Rscript data_processing/syphilis.manager/validation/run_validation.R \
            _ci_outputs/syphilis.manager.rdata \
            2>&1 | tee _ci_outputs/validation_report.txt

      - name: Commit updated spec
        if: inputs.update_spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_processing/syphilis.manager/validation/syphilis_manager_spec.json
          git diff --cached --quiet && echo "No spec changes" || \
            git commit -m "Update syphilis manager spec from CI build

          Sections: ${{ inputs.sections_release_tag }}
          Raw data: ${{ inputs.raw_data_release_tag }}
          Dependencies: ${{ inputs.deps_release_tag }}
          jheem2: ${{ inputs.jheem2_ref }}"
          git push

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syphilis-manager-build
          path: |
            _ci_outputs/build_log.txt
            _ci_outputs/validation_report.txt

      - name: Create versioned release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="syphilis-manager-v$(date +%Y.%m.%d)"
          # Append sequence number if tag already exists (multiple builds in a day)
          if gh release view "$VERSION_TAG" &>/dev/null; then
            SEQ=2
            while gh release view "${VERSION_TAG}.${SEQ}" &>/dev/null; do
              SEQ=$((SEQ + 1))
            done
            VERSION_TAG="${VERSION_TAG}.${SEQ}"
          fi

          # Build release notes with embedded validation report
          SPEC_NOTE=""
          if [ "${{ inputs.update_spec }}" = "true" ]; then
            SPEC_NOTE="Spec: UPDATED (review commit)"
          else
            SPEC_NOTE="Validation: PASSED"
          fi
          NOTES="## Build Info
          | | |
          |---|---|
          | **Sections** | \`${{ inputs.sections_release_tag }}\` |
          | **Raw Data** | \`${{ inputs.raw_data_release_tag }}\` |
          | **Dependencies** | \`${{ inputs.deps_release_tag }}\` |
          | **jheem2** | \`${{ inputs.jheem2_ref }}\` |
          | **Commit** | \`${GITHUB_SHA:0:7}\` |
          | **Status** | $SPEC_NOTE |

          > To promote this build to \`latest\`, run the **Promote Syphilis Manager** workflow with tag \`$VERSION_TAG\`."

          if [ -f _ci_outputs/validation_report.txt ]; then
            REPORT=$(cat _ci_outputs/validation_report.txt)
            NOTES="$NOTES

          <details>
          <summary>Validation Report (click to expand)</summary>

          \`\`\`
          $REPORT
          \`\`\`

          </details>"
          fi

          ASSETS="_ci_outputs/syphilis.manager.rdata"
          if [ -f _ci_outputs/validation_report.txt ]; then
            ASSETS="$ASSETS _ci_outputs/validation_report.txt"
          fi
          gh release create "$VERSION_TAG" \
            --title "Syphilis Manager $VERSION_TAG" \
            --notes "$NOTES" \
            $ASSETS
          echo "Published release: $VERSION_TAG"
